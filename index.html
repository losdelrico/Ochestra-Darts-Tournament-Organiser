  const standings = getGroupStandings(g.id);
  const gMatches = T.matches.filter(m => m.phase === 'group' && m.groupId === g.id);
  const done = gMatches.filter(m => m.status === 'done').length;
  const total = gMatches.length;
  return `
    <div class="card">
      <div class="group-header">
        <span class="group-name">${esc(g.name)}</span>
        <span class="tag ${done === total ? 'tag-green' : 'tag-blue'}">${done}/${total} gespielt</span>
      </div>
      <div class="scrollable">
        <table class="standings-table">
          <thead><tr><th></th><th>Spieler</th><th>W</th><th>L</th><th>Legs</th><th>Pkt</th></tr></thead>
          <tbody>
            ${standings.map((s, i) => {
              const adv = i < T.cfg.advanceCount;
              return `<tr class="${adv ? 'advance-row' : ''}">
                <td class="rank">${i + 1}</td>
                <td class="${adv ? 'advance' : ''}">
                  ${adv ? '<span style="display:inline-block;width:3px;height:14px;background:var(--tertiary);border-radius:2px;margin-right:6px;vertical-align:middle"></span>' : ''}
                  <span style="display:inline-flex;align-items:center;gap:6px">${playerAvatar(s.pid, 20)} ${esc(playerName(s.pid))}</span>
                </td>
                <td class="text-green">${s.w}</td>
                <td class="text-muted">${s.l}</td>
                <td class="text-muted">${s.legsFor}:${s.legsAgainst}</td>
                <td class="pts">${s.pts}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderGroups() {
  const allDone = allGroupMatchesDone();
  const totalDone = T.matches.filter(m => m.phase === 'group' && m.status === 'done').length;
  const totalGroup = T.matches.filter(m => m.phase === 'group').length;
  const pct = totalGroup > 0 ? Math.round(totalDone / totalGroup * 100) : 0;
  const activeCount = getActiveMatchCount();

  const tabBar = `
    <div class="phase-tabs">
      <button class="phase-tab ${groupTab === 'spielplan' ? 'active' : ''}" onclick="setGroupTab('spielplan')">Spielplan</button>
      <button class="phase-tab ${groupTab === 'tabelle' ? 'active' : ''}" onclick="setGroupTab('tabelle')">Tabelle</button>
    </div>
  `;

  let content = '';
  if (groupTab === 'tabelle') {
    content = T.groups.map(g => renderGroupStandings(g)).join('');
  } else {
    // Spielplan: interleave by group (A→B→A→B), active first, then pending, done at end
    const groupIds = T.groups.map(g => g.id);
    function interleaveByGroup(matches) {
      const byGroup = {};
      groupIds.forEach(id => { byGroup[id] = matches.filter(m => m.groupId === id); });
      const result = [];
      const max = Math.max(...groupIds.map(id => byGroup[id].length), 0);
      for (let i = 0; i < max; i++) {
        groupIds.forEach(id => { if (i < byGroup[id].length) result.push(byGroup[id][i]); });
      }
      return result;
    }
    const active  = interleaveByGroup(T.matches.filter(m => m.phase === 'group' && m.status === 'active'));
    const pending = interleaveByGroup(T.matches.filter(m => m.phase === 'group' && m.status === 'pending'));
    const done    = interleaveByGroup(T.matches.filter(m => m.phase === 'group' && m.status === 'done'));
    const openMatches = [...active, ...pending];
    const firstPendingIdx = openMatches.findIndex(x => x.status === 'pending');
    const renderItem = (m, idx, baseIdx = 0) => {
      const canStart = isAdmin && m.status === 'pending' && activeCount < T.cfg.boards;
      const isNext = m.status === 'pending' && (baseIdx + idx) === firstPendingIdx;
      const groupName = T.groups.find(g => g.id === m.groupId)?.name || '';
      const groupLabel = T.groups.length > 1 ? `<div class="match-group-label">${esc(groupName)}</div>` : '';
      return groupLabel + renderMatchCard(m, canStart, isNext);
    };
    const openHtml = openMatches.map((m, idx) => renderItem(m, idx)).join('');
    const doneHtml = done.map((m, idx) => renderItem(m, idx)).join('');
    const resultsDivider = done.length > 0 ? `<div style="display:flex;align-items:center;gap:10px;padding:4px 0 2px"><span style="font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.12em;white-space:nowrap">Resultate</span><div style="flex:1;height:1px;background:var(--glass-border)"></div></div>` : '';
    content = `<div class="card"><div class="matches-grid">${openHtml}${resultsDivider}${doneHtml}</div></div>`;
  }

  return `
    ${renderBoardSlots()}
    <div class="progress-wrap">
      <div class="progress-label"><span>Gruppenphase</span><span>${totalDone}/${totalGroup} Spiele</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${tabBar}
    ${content}
    ${allDone && isAdmin ? `
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
        <button class="btn btn-primary" onclick="goToKnockout()">K.O.-Phase starten</button>
      </div>
    ` : ''}
  `;
}

function renderBoardSlots() {
  const active = getActiveBoardMatches();
  if (active.length === 0) return '';
  let html = '<div class="boards-row">';
  for (let i = 0; i < T.cfg.boards; i++) {
    const m = active[i];
    if (m) {
      html += `<div class="board-slot occupied">
        <div class="board-slot-title">Board ${i + 1}</div>
        <div class="board-slot-match">${esc(playerName(m.p1))} vs ${esc(playerName(m.p2))}</div>
      </div>`;
    }
  }
  html += '</div>';
  return html;
}

function renderMatchCard(m, canStart, isNext) {
  const p1Name = playerName(m.p1);
  const p2Name = playerName(m.p2);
  let cls = 'match-card';
  if (m.status === 'done') cls += ' done';
  if (m.status === 'active') cls += ' active';
  if (isNext && m.status === 'pending') cls += ' next-up';
  if (!isAdmin) cls += ' view-only';

  const clickable = isAdmin && (m.status === 'active' || canStart || m.status === 'done');
  const onclick = clickable ? `openScoreModal('${m.id}')` : '';

  const w1 = m.winner === m.p1;
  const w2 = m.winner === m.p2;

  return `
    ${isNext && m.status === 'pending' ? `<div class="next-up-label">NEXT UP</div>` : ''}
    <div class="${cls}" ${onclick ? `onclick="${onclick}"` : ''}>
      ${m.status !== 'done' ? `<div style="display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;padding:0 12px 0 2px;border-right:1px solid ${m.status==='active'?'rgba(235,101,255,0.25)':'var(--glass-border)'};margin-right:6px;min-width:48px">
        ${m.status==='active'?`<span style="width:6px;height:6px;border-radius:50%;background:var(--secondary);box-shadow:0 0 8px var(--secondary);animation:pulse-dot 1.2s infinite;margin-bottom:2px"></span>`:''}
        <span style="font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.1em;color:${m.status==='active'?'var(--secondary)':'var(--text3)'};text-transform:uppercase">BOARD</span>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;color:${m.status==='active'?'var(--secondary)':'var(--primary)'}">${m.boardNumber}</span>
      </div>` : ''}
      <div class="match-player" style="flex:1">
        ${playerAvatar(m.p1, 24)}
        <span class="match-player-name ${w1 ? 'text-green font-bold' : ''}">${esc(p1Name)}</span>
        ${w1 ? '<div class="match-winner-dot"></div>' : ''}
      </div>
      <div class="match-score">
        <span class="match-score-num ${w1 ? 'text-green' : ''}" style="${m.status==='done'?'font-size:20px;font-family:Bebas Neue,sans-serif':''}">${m.legs1}</span>
        <span class="match-score-sep">:</span>
        <span class="match-score-num ${w2 ? 'text-green' : ''}" style="${m.status==='done'?'font-size:20px;font-family:Bebas Neue,sans-serif':''}">${m.legs2}</span>
      </div>
      <div class="match-player" style="flex:1;flex-direction:row-reverse">
        ${w2 ? '<div class="match-winner-dot"></div>' : ''}
        <span class="match-player-name ${w2 ? 'text-green font-bold' : ''}">${esc(p2Name)}</span>
        ${playerAvatar(m.p2, 24)}
      </div>
      ${(m.status !== 'pending' || isNext) ? `<span class="match-status-badge badge-${m.status}">
        ${m.status === 'pending' ? 'Next' : m.status === 'active' ? `<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:6px;height:6px;border-radius:50%;background:var(--secondary);box-shadow:0 0 6px var(--secondary);animation:pulse-dot 1.2s infinite"></span>Live</span>` : 'Fertig'}
      </span>` : ''}
      ${m.status === 'done' && isAdmin ? `<button class="undo-btn" onclick="event.stopPropagation();undoMatch('${m.id}')">Undo</button>` : ''}
    </div>
    ${!isAdmin && m.status !== 'done' && m.p1 && m.p2 ? `<div style="padding:4px 8px 8px"><button onclick="openProposalModal('${m.id}')" style="width:100%;padding:7px;background:rgba(148,170,255,0.08);border:1px solid rgba(148,170,255,0.2);border-radius:8px;color:var(--primary);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer">&#128226; Ergebnis melden</button></div>` : ''}
  `;
}

function renderKnockout() {
  const rounds = T.bracket.rounds || [];
  const totalRounds = rounds.length;
  const activeCount = getActiveMatchCount();

  let bracketHtml = '';
  rounds.forEach((roundIds, rIdx) => {
    const name = knockoutRoundName(rIdx, totalRounds);
    const matches = roundIds.map(id => T.matches.find(m => m.id === id)).filter(Boolean);
    const matchesHtml = matches.map(m => {
      const canStart = isAdmin && m.status === 'pending' && m.p1 && m.p2 && activeCount < T.cfg.boards;
      return renderBracketMatch(m, canStart);
    }).join('');
    bracketHtml += `
      <div class="bracket-section">
        <div class="bracket-round-title">${name}</div>
        <div class="bracket-matches">${matchesHtml}</div>
      </div>
    `;
  });

  const thirdMatch = T.matches.find(m => m.phase === 'knockout3rd');
  if (thirdMatch) {
    const canStart = isAdmin && thirdMatch.status === 'pending' && thirdMatch.p1 && thirdMatch.p2 && activeCount < T.cfg.boards;
    bracketHtml += `
      <div class="bracket-section">
        <div class="bracket-round-title">Spiel um Platz 3</div>
        <div class="bracket-matches">${renderBracketMatch(thirdMatch, canStart)}</div>
      </div>
    `;
  }

  const complete = isKnockoutComplete();

  return `
    ${renderBoardSlots()}
    ${bracketHtml}
    ${complete && isAdmin ? `
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
        <button class="btn btn-primary" onclick="goToResults()">Ergebnisse anzeigen</button>
      </div>
    ` : ''}
  `;
}

function renderBracketMatch(m, canStart) {
  const tbd1 = !m.p1;
  const tbd2 = !m.p2;
  const isFreilos = m.status === 'done' && (!m.p1 || !m.p2);
  const w1 = m.winner && m.winner === m.p1;
  const w2 = m.winner && m.winner === m.p2;
  let cls = 'bracket-match';
  if (m.status === 'done') cls += ' done-match';
  if (tbd1 && tbd2) cls += ' tbd-match';
  if (m.status === 'active') cls += ' active-match';
  const clickable = isAdmin && m.status !== 'done' && (m.status === 'active' || canStart) && m.p1 && m.p2;
  const editDone = isAdmin && m.status === 'done' && !isFreilos;

  if (isFreilos) {
    const winner = m.winner;
    return `
      <div class="${cls}" style="opacity:0.7">
        <div class="bracket-player-row winner-row">
          ${playerAvatar(winner, 22)}
          <span class="bracket-player-name">${esc(playerName(winner))}</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--tertiary)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="bracket-player-row" style="justify-content:center;padding:4px 12px">
          <span style="font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase">Freilos</span>
        </div>
      </div>
    `;
  }

  return `
    <div class="${cls}" ${(clickable || editDone) ? `onclick="openScoreModal('${m.id}')"` : ''}>
      ${m.boardNumber ? `<div style="padding:5px 14px 4px;border-bottom:1px solid ${m.status==='active'?'rgba(235,101,255,0.2)':'var(--glass-border)'};display:flex;align-items:center;gap:6px">
        ${m.status==='active'?`<span style="width:5px;height:5px;border-radius:50%;background:var(--secondary);box-shadow:0 0 6px var(--secondary);animation:pulse-dot 1.2s infinite"></span>`:''}
        <span style="font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.1em;color:${m.status==='active'?'var(--secondary)':m.status==='done'?'var(--text3)':'var(--text3)'};text-transform:uppercase">BOARD</span>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1;color:${m.status==='active'?'var(--secondary)':m.status==='done'?'var(--text3)':'var(--primary)'}">${m.boardNumber}</span>
      </div>` : ''}
      <div class="bracket-player-row ${w1 ? 'winner-row' : w2 ? 'loser-row' : ''}">
        ${m.p1 ? playerAvatar(m.p1, 22) : ''}
        <span class="bracket-player-name ${tbd1 ? 'bracket-player-tbd' : ''}">${tbd1 ? 'TBD' : esc(playerName(m.p1))}</span>
        ${m.status === 'done' ? `<span class="bracket-player-score ${w1 ? 'text-green' : 'text-muted'}">${m.legs1}</span>` : ''}
        ${w1 ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--tertiary)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
      </div>
      <div class="bracket-player-row ${w2 ? 'winner-row' : w1 ? 'loser-row' : ''}">
        ${m.p2 ? playerAvatar(m.p2, 22) : ''}
        <span class="bracket-player-name ${tbd2 ? 'bracket-player-tbd' : ''}">${tbd2 ? 'TBD' : esc(playerName(m.p2))}</span>
        ${m.status === 'done' ? `<span class="bracket-player-score ${w2 ? 'text-green' : 'text-muted'}">${m.legs2}</span>` : ''}
        ${w2 ? '<span style="color:var(--tertiary);font-size:14px">✓</span>' : ''}
      </div>
      ${m.status === 'done' && isAdmin ? `<div style="padding:4px 12px 8px;display:flex;justify-content:flex-end"><button class="undo-btn" onclick="event.stopPropagation();undoMatch('${m.id}')">Undo</button></div>` : ''}
      ${m.status === 'pending' && m.p1 && m.p2 && !canStart ? `<div style="padding:6px 12px;font-size:12px;color:var(--text3);font-family:'DM Sans',sans-serif">${isAdmin ? 'Wartet auf freies Board…' : 'Ausstehend'}</div>` : ''}
      ${m.status === 'pending' && canStart ? `<div style="padding:6px 12px;font-size:12px;color:var(--secondary);font-family:'Space Grotesk',sans-serif;font-weight:600">Klicken zum Starten</div>` : ''}
      ${!isAdmin && m.status !== 'done' && m.p1 && m.p2 ? `<div style="padding:6px 12px"><button onclick="openProposalModal('${m.id}')" style="width:100%;padding:8px;background:rgba(148,170,255,0.08);border:1px solid rgba(148,170,255,0.2);border-radius:8px;color:var(--primary);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer">&#128226; Ergebnis melden</button></div>` : ''}
    </div>
  `;
}

function renderResults() {
  const winner = getFinalWinner();
  const second = getFinalLoser();
  const third = get3rdPlace();
  const fourth = get4thPlace();

  let podiumHtml = '';
  if (winner) {
    podiumHtml = `
      <div class="podium">
        ${second ? `<div class="podium-place">
          <span class="podium-rank"><img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/2nd%20place%20medal/3D/2nd_place_medal_3d.png" width="32" height="32"></span>
          <div class="podium-avatar-p2">${playerAvatar(second, 40)}</div>
          <div class="podium-name p2-name">${esc(playerName(second))}</div>
          <div class="podium-block p2"></div>
        </div>` : ''}
        <div class="podium-place">
          <span class="podium-rank"><img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/1st%20place%20medal/3D/1st_place_medal_3d.png" width="40" height="40"></span>
          <div class="podium-avatar-p1">${playerAvatar(winner, 48)}</div>
          <div class="podium-name font-bold p1-name" style="font-size:16px">${esc(playerName(winner))}</div>
          <div class="podium-block p1"><img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Trophy/3D/trophy_3d.png" width="36" height="36" style="filter:drop-shadow(0 4px 12px rgba(235,101,255,0.5))"></div>
        </div>
        ${third ? `<div class="podium-place">
          <span class="podium-rank"><img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/3rd%20place%20medal/3D/3rd_place_medal_3d.png" width="28" height="28"></span>
          <div class="podium-avatar-p3">${playerAvatar(third, 36)}</div>
          <div class="podium-name p3-name">${esc(playerName(third))}</div>
          <div class="podium-block p3"></div>
        </div>` : ''}
      </div>
    `;
  }

  const allPlayers = T.players.map(p => {
    let rank = null;
    if (winner === p.id) rank = 1;
    else if (second === p.id) rank = 2;
    else if (third === p.id) rank = 3;
    else if (fourth === p.id) rank = 4;
    return { pid: p.id, rank };
  }).sort((a, b) => {
    if (a.rank && b.rank) return a.rank - b.rank;
    if (a.rank) return -1;
    if (b.rank) return 1;
    return 0;
  });

  const rankEmoji = {
  1: '<img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/1st%20place%20medal/3D/1st_place_medal_3d.png" width="24" height="24">',
  2: '<img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/2nd%20place%20medal/3D/2nd_place_medal_3d.png" width="24" height="24">',
  3: '<img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/3rd%20place%20medal/3D/3rd_place_medal_3d.png" width="24" height="24">',
  4: '4.'
};

  const fullStandings = allPlayers.map((p, i) => `
    <div class="result-row">
      <span class="result-rank">${p.rank ? (rankEmoji[p.rank] || p.rank + '.') : (i + 1) + '.'}</span>
      ${playerAvatar(p.pid, 32)}
      <span class="result-name">${esc(playerName(p.pid))}</span>
    </div>
  `).join('');

  const knockoutMatchesHtml = [...T.bracket.rounds || []].map((roundIds, rIdx) => {
    const name = knockoutRoundName(rIdx, T.bracket.rounds.length);
    const matches = roundIds.map(id => T.matches.find(m => m.id === id)).filter(m => m && m.status === 'done');
    if (!matches.length) return '';
    return `<div style="margin-bottom:12px">
      <div class="bracket-round-title">${name}</div>
      ${matches.map(m => `
        <div class="result-row" style="margin-top:6px">
          <span style="flex:1;display:flex;align-items:center;gap:6px">${playerAvatar(m.p1, 20)} <span class="${m.winner===m.p1?'text-green':''}">${esc(playerName(m.p1))}</span></span>
          <span class="font-bold" style="padding:0 8px;font-family:'Bebas Neue',sans-serif;font-size:22px">${m.legs1} : ${m.legs2}</span>
          <span style="flex:1;display:flex;align-items:center;gap:6px;justify-content:flex-end"><span class="${m.winner===m.p2?'text-green':''}">${esc(playerName(m.p2))}</span> ${playerAvatar(m.p2, 20)}</span>
        </div>
      `).join('')}
    </div>`;
  }).join('');

  const thirdMatch = T.matches.find(m => m.phase === 'knockout3rd' && m.status === 'done');
  const thirdMatchHtml = thirdMatch ? `
    <div style="margin-bottom:12px">
      <div class="bracket-round-title">Platz 3</div>
      <div class="result-row" style="margin-top:6px">
        <span style="flex:1;display:flex;align-items:center;gap:6px">${playerAvatar(thirdMatch.p1, 20)} <span class="${thirdMatch.winner===thirdMatch.p1?'text-green':''}">${esc(playerName(thirdMatch.p1))}</span></span>
        <span class="font-bold" style="padding:0 8px;font-family:'Bebas Neue',sans-serif;font-size:22px">${thirdMatch.legs1} : ${thirdMatch.legs2}</span>
        <span style="flex:1;display:flex;align-items:center;gap:6px;justify-content:flex-end"><span class="${thirdMatch.winner===thirdMatch.p2?'text-green':''}">${esc(playerName(thirdMatch.p2))}</span> ${playerAvatar(thirdMatch.p2, 20)}</span>
      </div>
    </div>
  ` : '';

  return `
    <div class="section-title text-center">Turnierergebnisse</div>
    ${podiumHtml}
    <div class="card">
      <div class="card-title">Endrangliste</div>
      <div class="results-full">${fullStandings}</div>
    </div>
    <div class="card">
      <div class="card-title">K.O.-Matches</div>
      ${knockoutMatchesHtml}
      ${thirdMatchHtml}
    </div>
    ${isAdmin ? `
    <div style="display:flex;justify-content:center;margin-top:8px">
      <button class="btn btn-secondary" onclick="newTournament()">Neues Turnier</button>
    </div>` : ''}
  `;
}

// ===================== MODAL =====================
function openScoreModal(matchId) {
  if (!isAdmin) return;
  const m = T.matches.find(x => x.id === matchId);
  if (!m) return;
  if (!m.p1 || !m.p2) return;

  modalMatchId = matchId;

  if (m.status === 'pending') {
    m.status = 'active';
    // assign next free board number
    const usedBoards = new Set(T.matches.filter(x => x.status === 'active' && x.id !== m.id).map(x => x.boardNumber));
    for (let b = 1; b <= T.cfg.boards; b++) {
      if (!usedBoards.has(b)) { m.boardNumber = b; break; }
    }
    save();
    archiveTournament();
    render();
  }

  const needed = neededLegs(m);
  const p1Name = playerName(m.p1);
  const p2Name = playerName(m.p2);
  const winResult = checkWinner(m.legs1, m.legs2, m);
  const modalTitle = m.is3rd ? 'Spiel um Platz 3' : m.isFinal ? 'Finale' : (m.phase === 'group' ? 'Gruppenspiel' : 'K.O.-Match');

  document.getElementById('modal-title').textContent = modalTitle;

  document.getElementById('modal-body').innerHTML = `
    <div style="text-align:center;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text3);margin-bottom:8px">Best of ${matchLegs(m)} — Wer zuerst ${needed} Leg${needed > 1 ? 's' : ''} gewinnt</div>
    <div class="score-display">
      <div class="score-player">
        ${playerAvatar(m.p1, 40)}
        <div class="score-player-name">${esc(p1Name)}</div>
        <div class="score-controls">
          <button class="score-btn" id="dec1" onclick="adjustScore('dec', 'p1')" ${m.legs1 <= 0 || m.status === 'done' ? 'disabled' : ''}>−</button>
          <div class="score-value" id="score1">${m.legs1}</div>
          <button class="score-btn" id="inc1" onclick="adjustScore('inc', 'p1')" ${m.status === 'done' || m.legs1 >= needed ? 'disabled' : ''}>+</button>
        </div>
      </div>
      <div class="score-sep">:</div>
      <div class="score-player">
        ${playerAvatar(m.p2, 40)}
        <div class="score-player-name">${esc(p2Name)}</div>
        <div class="score-controls">
          <button class="score-btn" id="dec2" onclick="adjustScore('dec', 'p2')" ${m.legs2 <= 0 || m.status === 'done' ? 'disabled' : ''}>−</button>
          <div class="score-value" id="score2">${m.legs2}</div>
          <button class="score-btn" id="inc2" onclick="adjustScore('inc', 'p2')" ${m.status === 'done' || m.legs2 >= needed ? 'disabled' : ''}>+</button>
        </div>
      </div>
    </div>
    <div class="score-winner-msg ${winResult ? 'show' : ''}" id="winner-msg">
      ${winResult ? `${esc(playerName(winResult === 'p1' ? m.p1 : m.p2))} gewinnt!` : ''}
    </div>
  `;

  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
    ${m.status === 'done' ? `<button class="btn btn-danger btn-sm" onclick="undoMatchFromModal()">Undo</button>` : ''}
    <button class="btn btn-primary" id="save-score-btn" onclick="saveScore()" ${!winResult && m.status !== 'done' ? 'disabled' : ''}>
      ${m.status === 'done' ? 'Schliessen' : 'Ergebnis speichern'}
    </button>
  `;

  document.getElementById('modal-backdrop').classList.add('open');
}

function adjustScore(dir, player) {
  const m = T.matches.find(x => x.id === modalMatchId);
  if (!m || m.status === 'done') return;
  const needed = neededLegs(m);

  if (player === 'p1') {
    if (dir === 'inc' && m.legs1 < needed) m.legs1++;
    if (dir === 'dec' && m.legs1 > 0) m.legs1--;
  } else {
    if (dir === 'inc' && m.legs2 < needed) m.legs2++;
    if (dir === 'dec' && m.legs2 > 0) m.legs2--;
  }

  const winResult = checkWinner(m.legs1, m.legs2, m);

  save();
  archiveTournament();

  document.getElementById('score1').textContent = m.legs1;
  document.getElementById('score2').textContent = m.legs2;

  const winMsg = document.getElementById('winner-msg');
  if (winResult) {
    const winPid = winResult === 'p1' ? m.p1 : m.p2;
    winMsg.className = 'score-winner-msg show';
    winMsg.textContent = `${playerName(winPid)} gewinnt!`;
  } else {
    winMsg.className = 'score-winner-msg';
    winMsg.textContent = '';
  }

  document.getElementById('dec1').disabled = m.legs1 <= 0;
  document.getElementById('inc1').disabled = m.legs1 >= needed;
  document.getElementById('dec2').disabled = m.legs2 <= 0;
  document.getElementById('inc2').disabled = m.legs2 >= needed;
  document.getElementById('save-score-btn').disabled = !winResult;
}

function saveScore() {
  const m = T.matches.find(x => x.id === modalMatchId);
  if (!m) return;

  if (m.status === 'done') { closeModal(); return; }

  const winResult = checkWinner(m.legs1, m.legs2, m);
  if (!winResult) return;

  m.winner = winResult === 'p1' ? m.p1 : m.p2;
  m.status = 'done';

  propagateKnockout(m.id);
  save();
  archiveTournament();
  closeModal();
  render();

  if (T.phase === 'knockout' && isKnockoutComplete()) {
    setTimeout(() => {
      const w = getFinalWinner();
      if (w) launchConfetti();
    }, 300);
  }
}

function undoMatchFromModal() {
  closeModal();
  undoMatch(modalMatchId);
}

function undoMatch(matchId) {
  const m = T.matches.find(x => x.id === matchId);
  if (!m || m.status !== 'done') return;

  if (m.phase === 'knockout') {
    T.matches.forEach(dep => {
      if (dep.phase === 'knockout' && (dep.fromMatch1 === matchId || dep.fromMatch2 === matchId)) {
        if (dep.status === 'done') undoMatch(dep.id);
        if (dep.fromMatch1 === matchId) dep.p1 = null;
        if (dep.fromMatch2 === matchId) dep.p2 = null;
        dep.winner = null; dep.status = 'pending'; dep.legs1 = 0; dep.legs2 = 0;
      }
      if (dep.phase === 'knockout3rd' && (dep.fromMatch1 === matchId || dep.fromMatch2 === matchId)) {
        if (dep.status === 'done') { dep.winner = null; dep.status = 'pending'; dep.legs1 = 0; dep.legs2 = 0; }
        if (dep.fromMatch1 === matchId) dep.p1 = null;
        if (dep.fromMatch2 === matchId) dep.p2 = null;
        if (dep.status !== 'done') { dep.winner = null; dep.status = 'pending'; dep.legs1 = 0; dep.legs2 = 0; }
      }
    });
  }

  m.winner = null;
  m.status = 'pending';
  m.legs1 = 0;
  m.legs2 = 0;
  save();
  archiveTournament();
  render();
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  const m = T.matches.find(x => x.id === modalMatchId);
  if (m && m.status === 'active') {
    m.status = 'pending';
    m.legs1 = 0;
    m.legs2 = 0;
    save();
    render();
  }
  modalMatchId = null;
}

// ===================== ACTIONS =====================
async function startTournament() {
  if (!isAdmin) return;
  if (T.players.length < 2) return;
  const hasProgress = T.matches.some(m => m.status === 'done');
  if (hasProgress) {
    const ok = await showConfirm('Turnier neu starten?', 'Das laufende Turnier wird überschrieben. Aktueller Stand wird automatisch im Archiv gespeichert.');
    if (!ok) return;
    archiveTournament();
    T.id = uid();
  }
  const name = T.cfg.name && T.cfg.name.trim() ? T.cfg.name.trim() : null;
  if (!name) { alert('Bitte zuerst einen Turniernamen eingeben.'); return; }
  const expectedGrpSize = Math.ceil(T.players.length / (T.cfg.groupCount || 1));
  if ((T.cfg.advanceCount || 2) >= expectedGrpSize) {
    alert(`Nicht möglich: ${T.cfg.advanceCount} Weiterkommende bei ~${expectedGrpSize} Spieler/Gruppe. Mindestens 1 Spieler muss ausscheiden.`);
    return;
  }
  T.cfg.name = name;
  generateGroups();
  generateGroupMatches();
  T.phase = 'groups';
  save();
  if (window._db) listenToTournament(T.id);
  render();
}

function goToKnockout() {
  if (!isAdmin || !allGroupMatchesDone()) return;
  generateKnockout();
  T.phase = 'knockout';
  save();
  render();
}

function goToResults() {
  if (!isAdmin) return;
  T.phase = 'results';
  save();
  render();
  setTimeout(() => {
    const w = getFinalWinner();
    if (w) launchConfetti();
  }, 200);
}

function addPlayer() {
  if (!isAdmin) return;
  T.players.push({ id: uid(), name: `Spieler ${T.players.length + 1}` });
  save();
  render();
}

function removePlayer(pid) {
  if (!isAdmin) return;
  if (T.players.length <= 2) return;
  T.players = T.players.filter(p => p.id !== pid);
  save();
  render();
}

function renamePlayer(pid, name) {
  if (!isAdmin) return;
  const p = T.players.find(x => x.id === pid);
  if (p) { p.name = name.trim() || p.name; save(); }
}

function liveRenamePlayer(pid, input) {
  if (!isAdmin) return;
  const name = input.value;
  const p = T.players.find(x => x.id === pid);
  if (!p) return;
  p.name = name || p.name;
  save();
  // Update avatar initial live without full re-render
  const row = input.closest('[data-pid]');
  if (row) {
    const avatar = row.querySelector('.player-avatar');
    if (avatar) avatar.textContent = (name || '?').slice(0, 1).toUpperCase();
  }
}

async function newTournament() {
  if (!isAdmin) return;
  const hasProgress = T.matches.some(m => m.status === 'done');
  const ok = await showConfirm('Turnier verlassen?', hasProgress ? 'Aktueller Stand wird automatisch im Archiv gespeichert.' : 'Neues Turnier starten?');
  if (!ok) return;
  if (hasProgress) archiveTournament();
  T = DEFAULT_STATE();
  save();
  render();
}

// ===================== PHASE NAV CLICK =====================
function bindPhaseNavEvents() {
  document.querySelectorAll('.nav-item').forEach(tab => {
    tab.addEventListener('click', () => {
      const phase = tab.dataset.phase;
      if (!phase) return;
      const order = ['setup', 'groups', 'knockout', 'results'];
      const curr = order.indexOf(T.phase);
      const target = order.indexOf(phase);
      // Setup tab always starts a new tournament when not already in setup
      if (phase === 'setup' && T.phase !== 'setup') {
        newTournament();
        return;
      }
      if (target <= curr) {
        T.phase = phase;
        save();
        render();
      }
    });
  });
}

// ===================== CONFETTI =====================
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  const colors = ['#f43f5e','#eab308','#22c55e','#3b82f6','#8b5cf6','#f97316'];

  for (let i = 0; i < 120; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      r: Math.random() * 6 + 3,
      d: Math.random() * 8 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      tilt: Math.random() * 10 - 10,
      tiltAngle: 0,
      tiltAngleInc: Math.random() * 0.07 + 0.05,
      opacity: 1
    });
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r, p.r * 0.4, p.tilt, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      p.tiltAngle += p.tiltAngleInc;
      p.y += (Math.cos(p.d) + p.d / 2) * 1.5;
      p.x += Math.sin(frame * 0.01 + i) * 1.5;
      p.tilt = Math.sin(p.tiltAngle) * 12;
      if (frame > 120) p.opacity -= 0.005;
    });
    frame++;
    if (frame < 250) {
      confettiAnim = requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  draw();
}

let proposalMatchId = null;
let proposalLegs1 = 0;
let proposalLegs2 = 0;

function openProposalModal(matchId) {
  const m = T.matches.find(x => x.id === matchId);
  if (!m || m.status === 'done') return;
  proposalMatchId = matchId;
  proposalLegs1 = 0;
  proposalLegs2 = 0;
  document.getElementById('proposal-p1-name').textContent = playerName(m.p1);
  document.getElementById('proposal-p2-name').textContent = playerName(m.p2);
  document.getElementById('proposal-score1').textContent = '0';
  document.getElementById('proposal-score2').textContent = '0';
  const needed = neededLegs(m);
  document.getElementById('proposal-needed-info').textContent = `Best of ${matchLegs(m)} — wer zuerst ${needed} Leg${needed>1?'s':''} gewinnt`;
  document.getElementById('proposal-match-title').textContent = m.isFinal ? 'Finale' : m.is3rd ? 'Platz 3' : m.phase === 'group' ? 'Gruppenspiel' : 'K.O.-Match';
  document.getElementById('proposal-submit-btn').disabled = true;
  document.getElementById('proposal-modal-backdrop').classList.add('open');
}
function closeProposalModal() {
  document.getElementById('proposal-modal-backdrop').classList.remove('open');
}
function adjustProposalScore(player, dir) {
  const m = T.matches.find(x => x.id === proposalMatchId);
  if (!m) return;
  const needed = neededLegs(m);
  if (player === 'p1') {
    if (dir === 'inc' && proposalLegs1 < needed) proposalLegs1++;
    if (dir === 'dec' && proposalLegs1 > 0) proposalLegs1--;
  } else {
    if (dir === 'inc' && proposalLegs2 < needed) proposalLegs2++;
    if (dir === 'dec' && proposalLegs2 > 0) proposalLegs2--;
  }
  document.getElementById('proposal-score1').textContent = proposalLegs1;
  document.getElementById('proposal-score2').textContent = proposalLegs2;
  const hasWinner = checkWinner(proposalLegs1, proposalLegs2, m);
  document.getElementById('proposal-submit-btn').disabled = !hasWinner;
}
function submitProposalFromModal() {
  submitProposal(proposalMatchId, proposalLegs1, proposalLegs2);
}

// ===================== PROPOSALS PANEL =====================
function renderProposalsPanel() {
  const entries = Object.entries(pendingProposals);
  if (!isAdmin || entries.length === 0) return '';
  const rows = entries.map(([pid, p]) => {
    const m = T.matches.find(x => x.id === p.matchId);
    if (!m) return '';
    const n1 = esc(playerName(m.p1));
    const n2 = esc(playerName(m.p2));

      <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(148,170,255,0.08)">

    </div>
    <div class="card">${rows}</div>
  `;
}

// ===================== UTILS =====================
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
