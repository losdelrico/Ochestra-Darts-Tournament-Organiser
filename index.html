<!--
  DART TURNIER — Deployment Guide

  OPTION A: GitHub Pages (kostenlos, empfohlen)
  1. Gehe zu github.com → New Repository → "dart-turnier"
  2. Upload diese index.html
  3. Settings → Pages → Source: main branch
  4. URL: https://[dein-username].github.io/dart-turnier

  OPTION B: Firebase Hosting + Realtime Database (für Multi-User)
  1. console.firebase.google.com → Neues Projekt erstellen
  2. Realtime Database aktivieren → Regeln: { "rules": { ".read": true, ".write": true } }
  3. Projekteinstellungen → Web-App hinzufügen → Config kopieren
  4. Config in FIREBASE_CONFIG unten einfügen
  5. Firebase Hosting: npm i -g firebase-tools → firebase deploy

  ADMIN: Standard-PIN ist 1234 → bitte sofort ändern in Setup
-->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCHESTRA</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060e20;
      --glass-1: rgba(148, 170, 255, 0.04);
      --glass-2: rgba(148, 170, 255, 0.08);
      --glass-3: rgba(148, 170, 255, 0.12);
      --glass-border: rgba(148, 170, 255, 0.12);
      --glass-border-strong: rgba(148, 170, 255, 0.25);
      --text: #dee5ff;
      --text2: #a3aac4;
      --text3: #6d758c;
      --primary: #94aaff;
      --secondary: #eb65ff;
      --tertiary: #81ecff;
      --red: #ff6e84;
      --green: #81ecff;
      --gold: #eb65ff;
      --radius: 16px;
      --radius-sm: 10px;
      --blur: blur(20px);
    }

    html, body, #app {
      background: var(--bg);
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* --- AMBIENT BLOBS --- */
    .ambient-blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: -1; filter: blur(80px); }
    .blob-1 { width: 400px; height: 400px; top: -100px; right: -100px; background: rgba(148,170,255,0.06); }
    .blob-2 { width: 300px; height: 300px; bottom: 100px; left: -80px; background: rgba(235,101,255,0.06); }

    /* --- SCROLLBAR --- */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148,170,255,0.2); border-radius: 10px; }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

    #app {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 16px 90px;
    }

    /* --- HEADER --- */
    .app-header {
      background: rgba(6, 14, 32, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--glass-border);
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 10px max(16px, env(safe-area-inset-right)) 10px max(16px, env(safe-area-inset-left));
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 -16px 20px;
    }
    .app-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--primary);
      letter-spacing: 0.05em;
      line-height: 1;
    }
    .app-tourname {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text2);
      line-height: 1;
      margin-top: 2px;
    }
    .header-left { display: flex; flex-direction: column; }
    .header-actions { display: flex; gap: 6px; align-items: center; }

    /* --- ADMIN/VIEW BADGES --- */
    .admin-badge { font-family:'Space Grotesk',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.1em; padding:3px 8px; border-radius:100px; background:rgba(235,101,255,0.2); color:var(--secondary); border:1px solid rgba(235,101,255,0.3); text-transform:uppercase; }
    .view-badge { font-family:'Space Grotesk',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.1em; padding:3px 8px; border-radius:100px; background:rgba(148,170,255,0.1); color:var(--text3); border:1px solid var(--glass-border); text-transform:uppercase; }

    /* --- BOTTOM NAV --- */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(6, 14, 32, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--glass-border);
      display: flex;
      padding: 8px 0 max(12px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 6px 4px;
      border-radius: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(148, 170, 255, 0.4);
      cursor: pointer; transition: all 0.2s;
      border: none; background: transparent;
      margin: 0 4px;
    }
    .nav-item.active { color: var(--secondary); background: rgba(235, 101, 255, 0.1); }
    .nav-item.done { color: var(--tertiary); }
    .nav-item.locked { opacity: 0.25; pointer-events: none; }
    .nav-icon { font-size: 18px; }

    /* --- BUTTONS --- */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; border: 1px solid transparent;
      font-size: 14px; cursor: pointer; transition: all 0.15s;
      white-space: nowrap; min-height: 44px; padding: 10px 18px;
      border-radius: var(--radius-sm);
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, var(--secondary), rgba(162, 0, 187, 0.9));
      color: white;
      font-family: 'Space Grotesk', sans-serif; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      border-radius: 12px; border: none;
      box-shadow: 0 8px 32px rgba(235, 101, 255, 0.3);
      padding: 14px 24px;
    }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 8px 40px rgba(235,101,255,0.5); transform: translateY(-1px); }
    .btn-secondary {
      background: var(--glass-2);
      border: 1px solid var(--glass-border);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif; font-weight: 600;
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      backdrop-filter: blur(8px);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--glass-3); border-color: var(--glass-border-strong); }
    .btn-ghost {
      background: transparent; color: var(--text2); border-color: transparent;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-ghost:hover:not(:disabled) { background: var(--glass-2); color: var(--text); }
    .btn-danger {
      background: rgba(255,110,132,0.1); color: var(--red);
      border-color: rgba(255,110,132,0.3);
      font-family: 'Space Grotesk', sans-serif;
    }
    .btn-danger:hover:not(:disabled) { background: rgba(255,110,132,0.2); }
    .btn-success {
      background: linear-gradient(135deg, var(--tertiary), #00d4ec);
      color: #003840;
      font-family: 'Space Grotesk', sans-serif; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(129, 236, 255, 0.25);
    }
    .btn-sm { padding: 6px 12px; font-size: 13px; min-height: 36px; }
    .btn-icon { padding: 8px; min-width: 36px; min-height: 36px; }

    /* --- CARDS --- */
    .card {
      background: var(--glass-1);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 700;
      color: var(--text); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .card-title .subtitle {
      font-size: 12px; font-weight: 400; color: var(--text2);
      margin-left: auto; text-transform: none; letter-spacing: 0;
      font-family: 'DM Sans', sans-serif;
    }

    /* --- SECTION TITLE --- */
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--text3);
      display: flex; align-items: center; gap: 8px;
      margin: 20px 0 10px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }

    /* --- SETUP --- */
    .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .setup-grid { grid-template-columns: 1fr; } }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px; font-weight: 700; color: var(--text3);
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.1em;
    }
    .field input, .field select {
      width: 100%;
      background: rgba(148, 170, 255, 0.06);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      padding: 10px 12px; outline: none;
      transition: border-color 0.15s, background 0.15s;
      min-height: 44px;
    }
    .field input:focus, .field select:focus {
      border-color: var(--secondary);
      outline: none;
      background: rgba(235, 101, 255, 0.08);
    }
    .field select option { background: #0f1930; }
    .field input[type="checkbox"] { width: auto; min-height: auto; accent-color: var(--secondary); }

    .player-list { display: flex; flex-direction: column; gap: 8px; }
    .player-item { display: flex; align-items: center; gap: 8px; }
    .player-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .player-name-input {
      flex: 1;
      background: rgba(148, 170, 255, 0.06);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px; padding: 9px 12px; outline: none;
      transition: border-color 0.15s; min-height: 44px;
    }
    .player-name-input:focus { border-color: var(--secondary); background: rgba(235,101,255,0.06); }
    .add-player-row { display: flex; align-items: center; gap: 8px; padding-top: 4px; }
    .player-count-badge { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text3); font-weight: 400; text-transform: none; letter-spacing: 0; }

    .save-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--glass-border);
    }
    .save-row:last-child { border-bottom: none; }
    .save-info { flex: 1; min-width: 0; }
    .save-name { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .save-meta { font-size: 12px; color: var(--text3); margin-top: 2px; font-family: 'DM Sans', sans-serif; }
    .save-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    /* --- BOARDS --- */
    .boards-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .board-slot {
      flex: 1; min-width: 140px;
      background: var(--glass-1);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 12px 14px;
      backdrop-filter: blur(8px);
    }
    .board-slot.occupied {
      border-color: rgba(235,101,255,0.4);
      background: rgba(235,101,255,0.05);
      box-shadow: 0 0 20px rgba(235,101,255,0.1);
    }
    .board-slot-title { font-family: 'Space Grotesk', sans-serif; font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .board-slot-match { font-size: 13px; font-weight: 500; color: var(--text); font-family: 'DM Sans', sans-serif; }
    .board-slot-free { font-size: 13px; color: var(--text3); font-style: italic; font-family: 'DM Sans', sans-serif; }

    /* --- PROGRESS BAR --- */
    .progress-wrap { margin-bottom: 20px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-family: 'DM Sans', sans-serif; }
    .progress-bar { height: 4px; background: var(--glass-2); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--secondary), var(--tertiary)); border-radius: 3px; transition: width 0.4s ease; box-shadow: 0 0 8px rgba(235,101,255,0.4); }

    /* --- MATCH CARDS --- */
    .matches-grid { display: flex; flex-direction: column; gap: 10px; }
    .match-card {
      background: var(--glass-1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: all 0.2s; position: relative;
    }
    .match-card:hover { border-color: rgba(235,101,255,0.3); background: var(--glass-2); }
    .match-card.done {
      opacity: 0.8; cursor: default;
      border-bottom: 2px solid rgba(235,101,255,0.5);
    }
    .match-card.done:hover { border-color: var(--glass-border); border-bottom-color: rgba(235,101,255,0.5); background: var(--glass-1); }
    .match-card.active {
      border-left: 3px solid var(--secondary);
      border-color: rgba(235,101,255,0.4);
      background: rgba(235,101,255,0.06);
      box-shadow: 0 0 24px rgba(235,101,255,0.15);
    }
    .match-card.next-up { border-color: rgba(148,170,255,0.4); }
    .match-card.view-only { cursor: default; }
    .match-card.view-only:hover { border-color: var(--glass-border); background: var(--glass-1); }
    .match-player { flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0; overflow: hidden; }
    .match-player-name { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .match-vs { font-size: 11px; color: var(--text3); padding: 0 4px; flex-shrink: 0; font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
    .match-score { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .match-score-num { font-family: 'Bebas Neue', sans-serif; font-size: 28px; min-width: 24px; text-align: center; line-height: 1; }
    .match-score-sep { color: var(--text3); font-size: 14px; font-family: 'Space Grotesk', sans-serif; }
    .match-status-badge { font-family: 'DM Sans', sans-serif; font-size: 11px; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; font-weight: 600; }
    .badge-pending { background: var(--glass-2); color: var(--text3); }
    .badge-active { background: rgba(235,101,255,0.15); color: var(--secondary); }
    .badge-done { background: rgba(129,236,255,0.1); color: var(--tertiary); }
    .match-winner-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--tertiary); box-shadow: 0 0 6px var(--tertiary); flex-shrink: 0; }
    .match-loser-dot { width: 6px; height: 6px; border-radius: 50%; background: transparent; flex-shrink: 0; }

    /* --- GROUP STANDINGS --- */
    .standings-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .standings-table th { text-align: left; padding: 6px 10px; color: var(--text3); font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; border-bottom: 1px solid var(--glass-border); }
    .standings-table td { padding: 8px 10px; border-bottom: 1px solid rgba(148,170,255,0.05); font-family: 'DM Sans', sans-serif; font-size: 14px; }
    .standings-table tr:last-child td { border-bottom: none; }
    .standings-table .rank { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text3); width: 24px; }
    .standings-table .advance { color: var(--secondary); font-weight: 600; font-family: 'Space Grotesk', sans-serif; }
    .standings-table .pts { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--secondary); }
    .standings-table .advance-row { border-left: 3px solid var(--tertiary); background: rgba(129,236,255,0.04); }

    /* --- KNOCKOUT BRACKET --- */
    .bracket-section { margin-bottom: 20px; }
    .bracket-round-title { font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; padding-left: 4px; }
    .bracket-matches { display: flex; flex-direction: column; gap: 8px; }
    .bracket-match {
      background: var(--glass-1);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      overflow: hidden; cursor: pointer; transition: all 0.2s;
    }
    .bracket-match:hover:not(.done-match):not(.tbd-match) { border-color: rgba(148,170,255,0.3); }
    .bracket-match.done-match { opacity: 0.8; cursor: default; }
    .bracket-match.done-match:hover { border-color: var(--glass-border); }
    .bracket-match.tbd-match { opacity: 0.4; cursor: not-allowed; }
    .bracket-match.active-match { border-left: 3px solid var(--secondary); border-color: rgba(235,101,255,0.4); box-shadow: 0 0 20px rgba(235,101,255,0.15); }
    .bracket-player-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--glass-border); }
    .bracket-player-row:last-child { border-bottom: none; }
    .bracket-player-row.winner-row { background: rgba(235,101,255,0.08); }
    .bracket-player-row.loser-row { opacity: 0.45; }
    .bracket-player-name { flex: 1; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; }
    .bracket-player-score { font-family: 'Bebas Neue', sans-serif; font-size: 20px; min-width: 24px; text-align: center; }
    .bracket-player-tbd { color: var(--text3); font-style: italic; font-size: 13px; font-weight: 400; font-family: 'DM Sans', sans-serif; }

    /* --- RESULTS --- */
    .podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin: 32px 0; }
    .podium-place { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .podium-block { width: 100px; border-radius: var(--radius-sm) var(--radius-sm) 0 0; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .podium-block.p1 { height: 90px; background: linear-gradient(135deg, var(--secondary), rgba(162,0,187,0.8)); box-shadow: 0 0 40px rgba(235,101,255,0.3); border: 1px solid rgba(235,101,255,0.4); }
    .podium-block.p2 { height: 65px; background: rgba(148,170,255,0.3); border: 1px solid rgba(148,170,255,0.3); }
    .podium-block.p3 { height: 48px; background: rgba(129,236,255,0.2); border: 1px solid rgba(129,236,255,0.25); }
    .podium-name { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 600; text-align: center; max-width: 100px; word-break: break-word; }
    .podium-name.p1-name { color: var(--secondary); }
    .podium-name.p2-name { color: var(--primary); }
    .podium-name.p3-name { color: var(--tertiary); }
    .podium-rank { font-size: 22px; }
    .podium-avatar-p1 { border: 2px solid var(--secondary); box-shadow: 0 0 24px rgba(235,101,255,0.4); border-radius: 50%; }
    .podium-avatar-p2 { border: 2px solid var(--primary); border-radius: 50%; }
    .podium-avatar-p3 { border: 2px solid var(--tertiary); border-radius: 50%; }
    .results-full { display: flex; flex-direction: column; gap: 8px; }
    .result-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--glass-1); border: 1px solid var(--glass-border); border-radius: 12px; backdrop-filter: blur(8px); }
    .result-rank { font-family: 'Bebas Neue', sans-serif; font-size: 20px; width: 30px; text-align: center; flex-shrink: 0; }
    .result-name { flex: 1; font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; }
    .result-details { font-size: 13px; color: var(--text2); font-family: 'DM Sans', sans-serif; }

    /* --- MODAL --- */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: rgba(6, 14, 32, 0.95);
      backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--glass-border-strong);
      border-radius: 20px;
      width: 100%; max-width: 420px; overflow: hidden;
      animation: modal-in 0.15s ease;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 40px rgba(235,101,255,0.08);
    }
    @keyframes modal-in { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }

<script>
// ===================== FIREBASE CONFIG =====================
// To enable multi-user mode:
// 1. Create a Firebase project at https://console.firebase.google.com
// 2. Enable Realtime Database
// 3. Fill in your config below
// 4. Set database rules to allow read: true, write: true (for simplicity)
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBosifVS55CUOjjb99T7Rj4MDn8P2Lt4Vo",
  authDomain: "ochestra-dart.firebaseapp.com",
  databaseURL: "https://ochestra-dart-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ochestra-dart",
  storageBucket: "ochestra-dart.firebasestorage.app",
  messagingSenderId: "564247884513",
  appId: "1:564247884513:web:121a17b0504df919653da0"
};
const FIREBASE_ENABLED = true;

// ===================== ADMIN STATE =====================
let isAdmin = false;

function checkAdminPin(enteredPin) {
  const storedPin = T.adminPin || '1234';
  return enteredPin === storedPin;
}

// ===================== STATE =====================
const COLORS = ['#f43f5e','#3b82f6','#22c55e','#eab308','#8b5cf6','#f97316','#06b6d4','#ec4899','#10b981','#6366f1'];
let T = null;
let modalMatchId = null;
let confirmCb = null;
let confettiAnim = null;
let groupTab = 'spielplan'; // 'spielplan' | 'tabelle'
let appPhase = 'landing';   // 'landing' | 'tournament'

const DEFAULT_STATE = () => ({
  id: uid(),
  phase: 'setup',
  cfg: { name: '', boards: 2, legsGroup: 3, legsKO: 5, legsFinal: 5, groupCount: 1, include3rd: true, advanceCount: 2 },
  players: [],
  groups: [],
  matches: [],
  bracket: { rounds: [] },
  activeMatches: [],
  results: {},
  adminPin: '1234'
});

function uid() { return Math.random().toString(36).slice(2, 9); }

function save() {
  try { localStorage.setItem('dart-turnier', JSON.stringify(T)); } catch(e) {}
  if (T && T.phase !== 'setup') archiveTournament();
  saveToFirebase();
}

function saveToFirebase() {
  if (!window._db || !T || !T.id) return;
  window._db.ref(`tournaments/${T.id}/state`).set(T).catch(console.error);
}

// ===================== FIREBASE INIT =====================
let _tournamentListener = null;
let _proposalListener = null;
let pendingProposals = {};

function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    window._db = firebase.database();

    // Check URL for ?t=tournamentId (viewer joining via QR code)
    const urlParams = new URLSearchParams(location.search);
    const urlTid = urlParams.get('t');

    if (urlTid) {
      // Viewer mode: load tournament from Firebase by ID
      window._db.ref(`tournaments/${urlTid}/state`).get().then(snapshot => {
        const data = snapshot.val();
        if (data) {
          T = data;
          if (!T.adminPin) T.adminPin = '1234';
          appPhase = 'tournament';
          isAdmin = false;
          listenToTournament(urlTid);
          render();
        } else {
          // Tournament not found, fallback to landing
          initFromLocalStorage();
          listenToTournament(T.id);
          render();
        }
      }).catch(() => {
        initFromLocalStorage();
        render();
      });
    } else {
      initFromLocalStorage();
      if (T && T.id) listenToTournament(T.id);
      render();
    }
  } catch(e) {
    console.warn('Firebase init failed', e);
    initFromLocalStorage();
    render();
  }
}

function initFromLocalStorage() {
  // Firebase is primary — always start fresh on landing (no ?t= param)
  T = DEFAULT_STATE();
  T.adminPin = '1234';
  saveToFirebase(); // ensure new tournament ID exists in Firebase immediately
}

function listenToTournament(tid) {
  if (!window._db) return;

  // State listener (for viewers — admin ignores remote state updates)
  if (_tournamentListener) _tournamentListener();
  const stateRef = window._db.ref(`tournaments/${tid}/state`);
  _tournamentListener = () => stateRef.off();
  stateRef.on('value', (snapshot) => {
    if (isAdmin) return; // admin owns the state
    const data = snapshot.val();
    if (data) {
      T = data;
      if (!T.adminPin) T.adminPin = '1234';
      render();
    }
  });

  // Proposals listener (everyone listens, admin sees badge)
  if (_proposalListener) _proposalListener();
  const proposalsRef = window._db.ref(`tournaments/${tid}/proposals`);
  _proposalListener = () => proposalsRef.off();
  proposalsRef.on('value', (snapshot) => {
    pendingProposals = snapshot.val() || {};
    updateProposalBadge();
  });
}

function getTournamentUrl(tid) {
  const base = location.origin + location.pathname;

// ===================== PROPOSALS =====================
function updateProposalBadge() {
  const count = Object.keys(pendingProposals).length;
  const badge = document.getElementById('proposal-badge');
  if (badge) {
    badge.textContent = count;
    badge.style.display = count > 0 ? 'flex' : 'none';
  }
  // Refresh proposals panel list if open
  const panelList = document.getElementById('proposals-panel-list');
  if (panelList) {
    if (!isAdmin || count === 0) {
      panelList.innerHTML = '<div style="text-align:center;padding:24px;color:rgba(255,255,255,0.3);font-family:\'DM Sans\',sans-serif;font-size:14px">Keine offenen Meldungen.</div>';
    } else {
      const entries = Object.entries(pendingProposals);
      panelList.innerHTML = entries.map(([pid, p]) => {
        if (!T) return '';
        const m = T.matches.find(x => x.id === p.matchId);
        if (!m) return '';
        const n1 = esc(playerName(m.p1));
        const n2 = esc(playerName(m.p2));
        const winner = p.legs1 > p.legs2 ? n1 : n2;
        return `<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(148,170,255,0.08)">
          <div style="flex:1;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text)">
            <span style="font-weight:600">${n1}</span> <span style="color:var(--text3)">${p.legs1} : ${p.legs2}</span> <span style="font-weight:600">${n2}</span>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">Vorgeschlagener Sieger: <span style="color:var(--tertiary)">${winner}</span></div>
          </div>
          <div style="display:flex;gap:6px">
            <button onclick="approveProposal('${pid}')" style="padding:6px 12px;background:rgba(129,236,255,0.12);border:1px solid rgba(129,236,255,0.3);border-radius:8px;color:var(--tertiary);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer">&#10003; OK</button>
            <button onclick="rejectProposal('${pid}')" style="padding:6px 10px;background:rgba(255,110,132,0.08);border:1px solid rgba(255,110,132,0.2);border-radius:8px;color:var(--red);font-size:13px;cursor:pointer">&#10005;</button>
          </div>
        </div>`;
      }).join('');
    }
  }
}

function submitProposal(matchId, legs1, legs2) {
  if (!window._db || !T) return;
  window._db.ref(`tournaments/${T.id}/proposals`).push({ matchId, legs1, legs2, submittedAt: Date.now(), status: 'pending' })
    .then(() => {
      showToast('Ergebnis gemeldet! Warte auf Admin-Bestätigung.');
      closeProposalModal();
    })
    .catch(() => showToast('Fehler beim Melden. Bitte erneut versuchen.'));
}

function approveProposal(proposalId) {
  const proposal = pendingProposals[proposalId];
  if (!proposal) return;
  const m = T.matches.find(x => x.id === proposal.matchId);
  if (!m || m.status === 'done') { rejectProposal(proposalId); return; }
  m.legs1 = proposal.legs1;
  m.legs2 = proposal.legs2;
  const winResult = checkWinner(m.legs1, m.legs2, m);
  if (winResult) {
    m.winner = winResult === 'p1' ? m.p1 : m.p2;
    m.status = 'done';
    propagateKnockoutWinner(m);
  }
  rejectProposal(proposalId);
  save();
  render();
}

function rejectProposal(proposalId) {
  if (!window._db || !T) return;
  window._db.ref(`tournaments/${T.id}/proposals/${proposalId}`).remove().catch(console.error);
}

function propagateKnockoutWinner(m) {
  if (!m || m.status !== 'done') return;
  T.matches.forEach(dep => {
    if (dep.phase !== 'knockout') return;
    if (dep.status === 'done') return;
    if (dep.fromMatch1 === m.id) dep.p1 = m.winner;
    if (dep.fromMatch2 === m.id) dep.p2 = m.winner;
  });
  T.matches.forEach(dep => {
    if (dep.phase !== 'knockout3rd') return;
    if (dep.status === 'done') return;
    if (dep.fromMatch1 === m.id) dep.p1 = m.p1 === m.winner ? m.p2 : m.p1;
    if (dep.fromMatch2 === m.id) dep.p2 = m.p1 === m.winner ? m.p2 : m.p1;
  });
}

function showToast(msg) {
  let toast = document.getElementById('toast-msg');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast-msg';
    toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2540;border:1px solid rgba(148,170,255,0.3);color:#fff;padding:12px 20px;border-radius:12px;font-family:DM Sans,sans-serif;font-size:14px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.5);pointer-events:none';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.style.opacity = '0'; }, 3000);
}

// ===================== ARCHIV =====================
function getSaves() {
  try { return JSON.parse(localStorage.getItem('dart-saves') || '[]'); } catch(e) { return []; }
}
function setSaves(saves) {
  try { localStorage.setItem('dart-saves', JSON.stringify(saves)); } catch(e) {}
}
function archiveTournament() {
  if (!T || T.phase === 'setup') return;
  if (!T.id) T.id = uid();
  const saves = getSaves();
  const idx = saves.findIndex(s => s.id === T.id);
  const phaseLabelMap = { setup: 'Setup', groups: 'Vorrunde', knockout: 'K.O.', results: 'Abgeschlossen' };
  const doneCnt = T.matches.filter(m => m.status === 'done').length;
  const entry = {
    id: T.id,
    name: T.cfg.name,
    savedAt: new Date().toLocaleString('de-CH', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }),
    phase: phaseLabelMap[T.phase] || T.phase,
    players: T.players.length,
    matchesDone: doneCnt,
    state: JSON.stringify(T)
  };
  if (idx >= 0) saves[idx] = entry;
  else saves.unshift(entry);
  setSaves(saves.slice(0, 20));
}
function loadSave(id) {
  const saves = getSaves();
  const s = saves.find(s => s.id === id);
  if (!s) return;
  T = JSON.parse(s.state);
  if (!T.adminPin) T.adminPin = '1234';
  save();
  render();
}
function deleteSave(id) {
  const saves = getSaves().filter(s => s.id !== id);
  setSaves(saves);
  render();
}
function saveNow() {
  archiveTournament();
  render();
  const btn = document.getElementById('save-now-btn');
  if (btn) { btn.textContent = 'Gespeichert'; btn.disabled = true; setTimeout(() => render(), 1200); }
}

function load() {
  try {
    const s = localStorage.getItem('dart-turnier');
    if (s) { T = JSON.parse(s); if (!T.id) T.id = uid(); return true; }
  } catch(e) {}
  return false;
}

// ===================== TOURNAMENT LOGIC =====================
function generateGroups() {
  const n = T.players.length;
  const g = T.cfg.groupCount;
  const groups = [];
  const shuffled = [...T.players].sort(() => Math.random() - 0.5);
  for (let i = 0; i < g; i++) {
    groups.push({ id: uid(), name: g === 1 ? 'Gruppe A' : 'Gruppe ' + String.fromCharCode(65 + i), playerIds: [] });
  }
  shuffled.forEach((p, i) => {
    groups[i % g].playerIds.push(p.id);
  });
  T.groups = groups;
}

function roundRobin(playerIds) {
  const pairs = [];
  const arr = [...playerIds];
  if (arr.length % 2 !== 0) arr.push(null);
  const n = arr.length;
  const fixed = arr[0];
  const rotating = arr.slice(1);
  for (let round = 0; round < n - 1; round++) {
    const current = [fixed, ...rotating];
    for (let i = 0; i < n / 2; i++) {
      const p1 = current[i];
      const p2 = current[n - 1 - i];
      if (p1 !== null && p2 !== null) {
        pairs.push([p1, p2]);
      }
    }
    rotating.unshift(rotating.pop());
  }
  return pairs;
}

function generateGroupMatches() {
  const matches = T.matches.filter(m => m.phase !== 'group');
  // Generate pairs per group, then interleave so groups alternate fairly
  const perGroup = T.groups.map(g => ({ id: g.id, pairs: roundRobin(g.playerIds) }));
  const interleaved = [];
  const maxLen = Math.max(...perGroup.map(g => g.pairs.length), 0);
  for (let i = 0; i < maxLen; i++) {
    perGroup.forEach(g => { if (i < g.pairs.length) interleaved.push({ groupId: g.id, pair: g.pairs[i] }); });
  }
  interleaved.forEach(({ groupId, pair }, idx) => {
    matches.push({
      id: uid(), phase: 'group', groupId,
      p1: pair[0], p2: pair[1], legs1: 0, legs2: 0, winner: null, status: 'pending',
      boardNumber: (idx % T.cfg.boards) + 1,
      fromMatch1: null, fromMatch2: null
    });
  });
  T.matches = matches;
}

function getGroupStandings(groupId) {
  const g = T.groups.find(x => x.id === groupId);
  if (!g) return [];
  const stats = {};
  g.playerIds.forEach(pid => { stats[pid] = { pid, w: 0, l: 0, legsFor: 0, legsAgainst: 0, pts: 0 }; });
  T.matches.filter(m => m.phase === 'group' && m.groupId === groupId && m.status === 'done').forEach(m => {
    if (m.winner === m.p1) {
      stats[m.p1].w++; stats[m.p1].pts += 2;
      stats[m.p2].l++;
    } else if (m.winner === m.p2) {
      stats[m.p2].w++; stats[m.p2].pts += 2;
      stats[m.p1].l++;
    }
    stats[m.p1].legsFor += m.legs1; stats[m.p1].legsAgainst += m.legs2;
    stats[m.p2].legsFor += m.legs2; stats[m.p2].legsAgainst += m.legs1;
  });
  return Object.values(stats).sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const diffA = a.legsFor - a.legsAgainst;
    const diffB = b.legsFor - b.legsAgainst;
    if (diffB !== diffA) return diffB - diffA;
    return b.legsFor - a.legsFor;
  });
}

function allGroupMatchesDone() {
  return T.matches.filter(m => m.phase === 'group').every(m => m.status === 'done');
}

function generateKnockout() {
  const advance = T.cfg.advanceCount;
  let seeds = [];
  if (T.groups.length === 1) {
    const standings = getGroupStandings(T.groups[0].id);
    seeds = standings.slice(0, Math.min(advance, standings.length)).map(s => s.pid);
  } else {
    const byRank = {};
    T.groups.forEach(g => {
      const standings = getGroupStandings(g.id);
      standings.slice(0, advance).forEach((s, rank) => {
        if (!byRank[rank]) byRank[rank] = [];
        byRank[rank].push(s.pid);
      });
    });
    const maxRank = advance;
    for (let r = 0; r < maxRank; r++) {
      if (byRank[r]) seeds = seeds.concat(byRank[r]);
    }
  }

  const n = seeds.length;
  let size = 1;
  while (size < n) size *= 2;

  const slots = new Array(size).fill(null);
  const order = bracketOrder(size);
  seeds.forEach((pid, i) => { if (i < order.length) slots[order[i]] = pid; });

  const knockoutMatches = [];
  const rounds = [];
  let prevRoundMatchIds = null;
  const totalRounds = Math.log2(size);
  let koBoard = 0;

  for (let r = 0; r < totalRounds; r++) {
    const matchCount = size / Math.pow(2, r + 1);
    const roundMatchIds = [];
    for (let i = 0; i < matchCount; i++) {
      koBoard++;
      const isFinal = (r === totalRounds - 1) && (matchCount === 1);
      const m = {
        id: uid(), phase: 'knockout', round: r, matchIndex: i,
        isFinal: isFinal,
        p1: null, p2: null, legs1: 0, legs2: 0, winner: null, status: 'pending',
        boardNumber: ((koBoard - 1) % T.cfg.boards) + 1,
        fromMatch1: null, fromMatch2: null
      };
      if (r === 0) {
        m.p1 = slots[i * 2] || null;
        m.p2 = slots[i * 2 + 1] || null;
        if (m.p1 && !m.p2) { m.winner = m.p1; m.status = 'done'; }
        else if (m.p2 && !m.p1) { m.winner = m.p2; m.status = 'done'; }
      } else {
        m.fromMatch1 = prevRoundMatchIds[i * 2];
        m.fromMatch2 = prevRoundMatchIds[i * 2 + 1];
        const src1 = knockoutMatches.find(x => x.id === m.fromMatch1);
        const src2 = knockoutMatches.find(x => x.id === m.fromMatch2);
        if (src1 && src1.status === 'done') m.p1 = src1.winner;
        if (src2 && src2.status === 'done') m.p2 = src2.winner;
      }
      knockoutMatches.push(m);
      roundMatchIds.push(m.id);
    }
    prevRoundMatchIds = roundMatchIds;
    rounds.push(roundMatchIds);
  }

  if (T.cfg.include3rd && rounds.length >= 2) {
    const semiIds = rounds[rounds.length - 2];
    if (semiIds && semiIds.length >= 2) {
      const thirdMatch = {
        id: uid(), phase: 'knockout3rd', round: rounds.length - 1, matchIndex: 0,
        p1: null, p2: null, legs1: 0, legs2: 0, winner: null, status: 'pending',
        fromMatch1: semiIds[0], fromMatch2: semiIds[1], is3rd: true
      };
      const s1 = knockoutMatches.find(x => x.id === semiIds[0]);
      const s2 = knockoutMatches.find(x => x.id === semiIds[1]);
      if (s1 && s1.status === 'done') thirdMatch.p1 = s1.p1 === s1.winner ? s1.p2 : s1.p1;
      if (s2 && s2.status === 'done') thirdMatch.p2 = s2.p1 === s2.winner ? s2.p2 : s2.p1;
      knockoutMatches.push(thirdMatch);
    }
  }

  T.matches = T.matches.filter(m => m.phase === 'group').concat(knockoutMatches);
  T.bracket = { rounds, size, seeds };
}

function bracketOrder(size) {
  if (size === 1) return [0];
  if (size === 2) return [0, 1];
  if (size === 4) return [0, 3, 2, 1];
  if (size === 8) return [0, 7, 4, 3, 2, 5, 6, 1];
  if (size === 16) return [0, 15, 8, 7, 4, 11, 12, 3, 2, 13, 10, 5, 6, 9, 14, 1];
  return Array.from({ length: size }, (_, i) => i);
}

function propagateKnockout(savedMatchId) {
  const saved = T.matches.find(m => m.id === savedMatchId);
  if (!saved || saved.status !== 'done') return;

  T.matches.forEach(m => {
    if (m.phase !== 'knockout') return;
    if (m.status === 'done') return;
    let changed = false;
    if (m.fromMatch1 === savedMatchId) { m.p1 = saved.winner; changed = true; }
    if (m.fromMatch2 === savedMatchId) { m.p2 = saved.winner; changed = true; }
  });

  T.matches.forEach(m => {
    if (m.phase !== 'knockout3rd') return;
    if (m.status === 'done') return;
    if (m.fromMatch1 === savedMatchId) {
      m.p1 = saved.p1 === saved.winner ? saved.p2 : saved.p1;
    }
    if (m.fromMatch2 === savedMatchId) {
      m.p2 = saved.p1 === saved.winner ? saved.p2 : saved.p1;
    }
  });
}

function getFinalWinner() {
  const finals = T.matches.filter(m => m.phase === 'knockout' && m.round === T.bracket.rounds.length - 1 && !m.is3rd);
  if (!finals.length) return null;
  const final = finals[0];
  return final.status === 'done' ? final.winner : null;
}

function getFinalLoser() {
  const finals = T.matches.filter(m => m.phase === 'knockout' && m.round === T.bracket.rounds.length - 1 && !m.is3rd);
  if (!finals.length) return null;
  const final = finals[0];
  if (final.status !== 'done') return null;
  return final.p1 === final.winner ? final.p2 : final.p1;
}

function get3rdPlace() {
  const m = T.matches.find(m => m.phase === 'knockout3rd');
  if (!m || m.status !== 'done') return null;
  return m.winner;
}

function get4thPlace() {
  const m = T.matches.find(m => m.phase === 'knockout3rd');
  if (!m || m.status !== 'done') return null;
  return m.p1 === m.winner ? m.p2 : m.p1;
}

function getActiveMatchCount() {
  return T.matches.filter(m => m.status === 'active').length;
}

function getActiveBoardMatches() {
  return T.matches.filter(m => m.status === 'active');
}

function knockoutRoundName(round, totalRounds) {
  const diff = totalRounds - 1 - round;
  if (diff === 0) return 'Finale';
  if (diff === 1) return 'Halbfinale';
  if (diff === 2) return 'Viertelfinale';
  return `Runde ${round + 1}`;
}

function isKnockoutComplete() {
  const finalMatch = T.matches.filter(m => m.phase === 'knockout' && m.round === T.bracket.rounds.length - 1);
  if (!finalMatch.length) return false;
  const finalDone = finalMatch.every(m => m.status === 'done');
  if (!T.cfg.include3rd) return finalDone;
  const thirdMatch = T.matches.find(m => m.phase === 'knockout3rd');
  if (!thirdMatch) return finalDone;
  return finalDone && thirdMatch.status === 'done';
}

// ===================== SCORE LOGIC =====================
function matchLegs(match) {
  const cfg = T.cfg;
  const lg = cfg.legsGroup || cfg.legs || 3;
  const lk = cfg.legsKO    || cfg.legs || 5;
  const lf = cfg.legsFinal || cfg.legs || 5;
  if (!match || match.phase === 'group') return lg;
  if (match.isFinal) return lf;
  return lk; // knockout + 3rd place
}

function neededLegs(match) {
  return Math.ceil(matchLegs(match) / 2);
}

function checkWinner(legs1, legs2, match) {
  const n = neededLegs(match);
  if (legs1 >= n) return 'p1';
  if (legs2 >= n) return 'p2';
  return null;
}

// ===================== RENDER =====================
function render() {
  const app = document.getElementById('app');
  if (!T) { app.innerHTML = ''; return; }

  const blobs = document.querySelectorAll('.ambient-blob');
  if (appPhase === 'landing') {
    blobs.forEach(b => b.style.opacity = '0');
    app.innerHTML = renderLanding();
    return;
  }
  blobs.forEach(b => b.style.opacity = '');

  // Viewers never see setup — forward to the active tournament phase
  if (!isAdmin && T.phase === 'setup') {
    T.phase = 'groups';
  }

  let html = '';
  html += renderHeader();
  if (T.phase === 'setup') html += renderSetup();
  else if (T.phase === 'groups') html += renderGroups();
  else if (T.phase === 'knockout') html += renderKnockout();
  else if (T.phase === 'results') html += renderResults();
  app.innerHTML = html;
  bindSetupEvents();
  bindPhaseNavEvents();
}

function enterAsViewer() {
  isAdmin = false;
  appPhase = 'tournament';
  render();
}

function landingViewTournament(id) {
  if (id !== '__current__') {
    const s = getSaves().find(x => x.id === id);
    if (s) { T = JSON.parse(s.state); if (!T.adminPin) T.adminPin = '1234'; }
  }
  isAdmin = false;
  appPhase = 'tournament';
  render();
}

function landingAdminLogin() {
  const input = document.getElementById('landing-pin');
  const err = document.getElementById('landing-pin-error');
  const pin = input.value.trim();
  if (!pin) { err.textContent = 'PIN eingeben'; return; }

  const sel = document.getElementById('landing-admin-select');
  const targetId = sel ? sel.value : '__current__';

  if (targetId === '__new__') {
    if (pin !== (T.adminPin || '1234')) { err.textContent = 'Falscher PIN'; input.value = ''; input.focus(); return; }
    archiveTournament();
    T = DEFAULT_STATE();
    T.adminPin = pin;
    save();
  } else if (targetId !== '__current__') {
    const s = getSaves().find(x => x.id === targetId);
    if (!s) { err.textContent = 'Turnier nicht gefunden'; return; }
    const tState = JSON.parse(s.state);
    if (pin !== (tState.adminPin || '1234')) { err.textContent = 'Falscher PIN'; input.value = ''; input.focus(); return; }
    T = tState;
    if (!T.adminPin) T.adminPin = '1234';
    try { localStorage.setItem('dart-turnier', JSON.stringify(T)); } catch(e) {}
  } else {
    if (!checkAdminPin(pin)) { err.textContent = 'Falscher PIN'; input.value = ''; input.focus(); return; }
  }

  if (landingPinMode === 'delete') {
    document.getElementById('landing-pin-panel').style.display = 'none';
    if (targetId === '__current__') {
      const saves = getSaves().filter(s => s.id !== T.id);
      setSaves(saves);
      T = DEFAULT_STATE(); T.adminPin = pin;
      try { localStorage.setItem('dart-turnier', JSON.stringify(T)); } catch(e) {}
    } else {
      const saves = getSaves().filter(s => s.id !== targetId);
      setSaves(saves);
    }
    render(); return;
  }
  isAdmin = true;
  appPhase = 'tournament';
  render();
}

let landingPinTarget = null;
let landingPinMode = 'admin'; // 'admin' | 'delete'

function showLandingPin(id, mode = 'admin') {
  landingPinTarget = id;
  landingPinMode = mode;
  document.getElementById('landing-admin-select').value = id;
  const saves = getSaves();
  let name = '';
  if (id === '__new__') name = 'Neues Turnier';
  else if (id === '__current__') name = T.cfg.name + ' (aktiv)';
  else { const s = saves.find(x => x.id === id); name = s ? s.name : ''; }
  document.getElementById('landing-pin-target-name').textContent = name;
  document.getElementById('landing-pin-title').textContent = mode === 'delete' ? 'Turnier löschen' : 'Admin Login';
  document.getElementById('landing-pin-icon').textContent = mode === 'delete' ? '🗑' : '🔒';
  document.getElementById('landing-pin-btn').textContent = mode === 'delete' ? 'LÖSCHEN' : 'LOGIN →';
  document.getElementById('landing-pin-btn').style.background = mode === 'delete' ? 'linear-gradient(135deg,#ff6e84,#e0365a)' : 'linear-gradient(135deg,#c855f7,#8b3cf7)';
  document.getElementById('landing-pin-btn').style.boxShadow = mode === 'delete' ? '0 4px 20px rgba(255,80,100,0.35)' : '0 4px 20px rgba(180,80,255,0.35)';
  document.getElementById('landing-pin').value = '';
  document.getElementById('landing-pin-error').textContent = '';
  document.getElementById('landing-pin-panel').style.display = 'flex';
  setTimeout(() => document.getElementById('landing-pin').focus(), 50);
}

function renderLanding() {

  const phaseColors = { setup: 'var(--text3)', groups: 'var(--primary)', knockout: 'var(--secondary)', results: 'var(--tertiary)' };
  const totalMatches = T.matches.filter(m => m.phase === 'group' || m.phase === 'knockout').length;
  const doneMathces = T.matches.filter(m => m.status === 'done').length;
  const activeTournament = T.phase !== 'setup';

  const saves = getSaves();
  const pColors = { Vorrunde:'var(--primary)', 'K.O.':'var(--secondary)', 'K.O.-Phase':'var(--secondary)', Abgeschlossen:'var(--tertiary)', Setup:'var(--text3)' };

  // Build tournament list: active first, then saves deduped

            <button id="landing-pin-btn" onclick="landingAdminLogin()" style="flex:1;padding:14px;background:linear-gradient(135deg,#c855f7,#8b3cf7);border:none;border-radius:12px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.05em;cursor:pointer;box-shadow:0 4px 20px rgba(180,80,255,0.35)">LOGIN →</button>

function renderHeader() {
  const phases = [
    { key: 'setup', label: 'Setup', icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>` },
    { key: 'groups', label: 'Vorrunde', icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="7" r="2"/><circle cx="15" cy="7" r="2"/><path d="M3 21v-2a4 4 0 0 1 4-4h4"/><path d="M13 21v-2a4 4 0 0 1 4-4h4"/></svg>` },
    { key: 'knockout', label: 'K.O.', icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 6h8M8 12h5M8 18h3"/><path d="M4 4h16v16H4z" rx="2"/></svg>` },
    { key: 'results', label: 'Ergebnis', icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>` }
  ];
  const order = ['setup', 'groups', 'knockout', 'results'];
  const curr = order.indexOf(T.phase);

  let tabs = '';
  phases.forEach((p, i) => {
    let cls = 'nav-item';
    if (p.key === T.phase) cls += ' active';
    else if (i < curr) cls += ' done';
    else cls += ' locked';
    const clickable = i <= curr || (i === curr + 1 && canAdvance());
    const label = (p.key === 'setup' && T.phase !== 'setup') ? 'Neu' : p.label;
    if (p.key === 'setup' && !isAdmin) return; // viewers never see setup tab
    tabs += `<button class="${cls}" data-phase="${p.key}" ${clickable ? '' : 'disabled'}>
      <span class="nav-icon">${p.icon}</span>
      <span>${label}</span>
    </button>`;

  const adminHtml = isAdmin

  const proposalBadgeBtn = isAdmin && proposalCount > 0
    ? `<button onclick="document.getElementById('proposals-panel-backdrop').classList.add('open')" style="position:relative;padding:6px 10px;background:rgba(235,101,255,0.12);border:1px solid rgba(235,101,255,0.3);border-radius:8px;color:var(--secondary);font-size:13px;cursor:pointer;min-height:32px">
        &#128226;
        <span id="proposal-badge" style="display:flex;position:absolute;top:-4px;right:-4px;background:var(--secondary);color:#fff;border-radius:99px;font-size:10px;width:18px;height:18px;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700">${proposalCount}</span>
       </button>`
    : `<span id="proposal-badge" style="display:none"></span>`;

  return `

      <div class="header-left">
        <div class="app-logo">OCHESTRA</div>
        <div class="app-tourname">${esc(T.cfg.name)}</div>
      </div>
      <div class="header-actions">
        <button onclick="openQrModal()" style="padding:6px 10px;background:rgba(148,170,255,0.08);border:1px solid rgba(148,170,255,0.2);border-radius:8px;color:var(--primary);font-size:13px;cursor:pointer;min-height:32px" title="QR Code">&#128241;</button>
        ${proposalBadgeBtn}
        ${T.phase !== 'setup' && isAdmin ? `<button id="save-now-btn" class="btn btn-ghost btn-sm" onclick="saveNow()" style="color:var(--secondary);font-size:12px;min-height:32px">Speichern</button>` : ''}
        ${isAdmin ? `<button class="btn btn-ghost btn-sm" onclick="openArchive()" style="font-size:12px;min-height:32px">Archiv</button>` : ''}
        ${adminHtml}
      </div>

    <nav class="bottom-nav">${tabs}</nav>

}

function canAdvance() {
  if (T.phase === 'setup') return T.players.length >= 2;
  if (T.phase === 'groups') return allGroupMatchesDone();
  if (T.phase === 'knockout') return isKnockoutComplete();
  return false;
}

  if (!isAdmin) {
    return `

function renderArchive() {
  const saves = getSaves();
  if (saves.length === 0) return '';
  const phaseColor = { 'Abgeschlossen': 'var(--tertiary)', 'K.O.': 'var(--secondary)', 'Vorrunde': 'var(--primary)', 'Setup': 'var(--text2)' };
  const rows = saves.map(s => `
    <div class="save-row">
      <div class="save-info">
        <div class="save-name">${esc(s.name)}</div>
        <div class="save-meta">
          <span style="color:${phaseColor[s.phase]||'var(--text2)'}">${s.phase}</span>
          &nbsp;·&nbsp;${s.players} Spieler&nbsp;·&nbsp;${s.matchesDone} Spiele&nbsp;·&nbsp;${s.savedAt}
        </div>
      </div>
      <div class="save-actions">
        <button class="btn btn-secondary btn-sm" onclick="loadSave('${s.id}')">Laden</button>
        ${isAdmin ? `<button class="btn btn-ghost btn-sm btn-icon" onclick="deleteSave('${s.id}')" title="Löschen" style="color:#666">✕</button>` : ''}
      </div>
    </div>
  `).join('');
  return `
    <div class="section-title" style="margin-top:28px">Archiv <span style="font-size:11px;font-weight:400;color:var(--text3);font-family:'DM Sans',sans-serif;letter-spacing:normal;text-transform:none">(${saves.length})</span></div>
    <div class="card" style="padding:0;overflow:hidden">${rows}</div>
  `;
}

function setGroupTab(tab) { groupTab = tab; render(); }
